<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        /* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body */
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    padding: 30px;
}

/* Heading */
h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

/* Table */
table {
    width: 70%;
    margin: auto;
    border-collapse: collapse;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* Header */
thead {
    background: #e23744;
    color: white;
}

th {
    padding: 14px;
    font-size: 16px;
    text-transform: uppercase;
}

/* Table cells */
td {
    padding: 12px;
    text-align: center;
    color: #444;
}

/* Borders */
th, td {
    border-bottom: 1px solid #eee;
}

/* Alternate rows */
tbody tr:nth-child(even) {
    background-color: #fafafa;
}

/* Hover effect */
tbody tr:hover {
    background-color: #ffe5e7;
    transition: 0.3s;
}

/* Salary highlight */
td:last-child {
    font-weight: bold;
    color: #e23744;
}
    </style>
    <h1>Tables in HTML</h1>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>salary</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>amit</td>
                <td>python developer</td>
                <td>1,70,000</td>
            </tr>
            <tr>
                <td>aman</td>
                <td>software developer</td>
                <td>1,43,000</td>
            </tr>


            <tr>
                <td>raman</td>
                <td>software developer</td>
                <td>1000$</td>
            </tr>
            <tr>
                <td>Thank
                 <td colspan="2">You</td>
                </td>
            </tr>

    </table>
</body>

</html>
